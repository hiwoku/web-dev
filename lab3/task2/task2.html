<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f5f7;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #e7e7ee;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 22px;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    #taskInput {
      flex: 1;
      padding: 12px;
      border: 1px solid #d6d7e0;
      border-radius: 20px;
      outline: none;
      font-size: 14px;
    }
    #taskInput:focus {
      border-color: #91c2a3;
      box-shadow: 0 0 0 3px rgba(106, 92, 255, 0.15);
    }
    #addBtn {
      padding: 12px 14px;
      border: none;
      border-radius: 20px;
      background: #47b750;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    #addBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid #ececf4;
      border-radius: 20px;
      background: #fafbff;
    }
    .text {
      flex: 1;
      font-size: 14px;
      word-break: break-word;
    }
    .done .text {
      text-decoration: line-through;
      color: #6b6b77;
    }
    .del {
      border: none;
      border-radius: 20px;
      padding: 8px 10px;
      background: #ff3b30;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>To-Do List</h1>

    <div class="row">
      <input id="taskInput" type="text" placeholder="Add a new task..." />
      <button id="addBtn" type="button">Add</button>
    </div>

    <ul id="list"></ul>
  </div>

  <script>
    "use strict";

    const input = document.querySelector("#taskInput");
    const addBtn = document.querySelector("#addBtn");
    const list = document.querySelector("#list");

    function setButtonState() {
      addBtn.disabled = input.value.trim().length === 0;
    }

    function makeItem(text) {
      const li = document.createElement("li");
      li.classList.add("item");

      const cb = document.createElement("input");
      cb.type = "checkbox";

      const span = document.createElement("span");
      span.classList.add("text");
      span.textContent = text;

      const delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.classList.add("del");
      delBtn.textContent = "Delete";

      cb.addEventListener("change", () => {
        li.classList.toggle("done");
      });

      delBtn.addEventListener("click", () => {
        list.removeChild(li);
      });

      li.appendChild(cb);
      li.appendChild(span);
      li.appendChild(delBtn);

      return li;
    }

    function addTask() {
      const text = input.value.trim();
      if (text.length === 0) return;

      const li = makeItem(text);
      list.appendChild(li);

      input.value = "";
      input.focus();
      setButtonState();
    }

    addBtn.addEventListener("click", addTask);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTask();
    });

    input.addEventListener("input", setButtonState);

    setButtonState();
  </script>
</body>
</html>
